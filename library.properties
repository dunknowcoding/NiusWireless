sentence=Unified Arduino driver for RFID-RC522, LoRa, NRF24L01, HC-12, HC-05/06 and PN532.
paragraph=Cross-platform Arduino library for wireless and RF modules. Drivers include MFRC522 (RFID/NFC over SPI and I2C, with CUID / UFUID / FUID magic-tag support), RFM9x / RA-01 / RA-02 (LoRa 433 / 470 / 868 / 915 MHz), SX1261 / SX1262 / SX1268, NRF24L01 (+), HC-12 long-range serial, HC-05 / HC-06 Bluetooth SPP, and PN532 NFC. Compatible with AVR, SAMD, ESP32, ESP8266, nRF52, STM32, RP2040 / RP2350, Renesas RA (UNO R4) and more.
category=Communication
